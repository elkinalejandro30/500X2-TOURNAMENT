<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>500X2 TOURNAMENT</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which will cause the browser to refresh the page without losing
      // the new url. If the browser is refreshed, the 404.html file will
      // be served again (as it is the only file that exists), and the
      // redirect will happen again, and so on.
      var pathSegs = window.location.pathname.split('/');
      var base = pathSegs[1];
      var l = window.location;
      window.history.replaceState(null, null,
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/' + base + '/?p=/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
      window.location.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/' + base + '/');
    </script>
  </head>
  <body>
  </body>
</html>
